<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hypergram</title>
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
<canvas id="canvas"></canvas>
<div id="tools">
  <label id="label-file-input" for="file-input">UPLOAD FILE</label>
  <input id="file-input" type="file">
  <div class="container-range">
    <label for="brightness">Brightness</label>
    <input id="brightness" onchange="editImage()" type="range" min="-255" max="255" step="1">
  </div>
  <div class="container-range">
    <label for="contrast">Contrast</label>
    <input id="contrast" onchange="editImage()" type="range" min="-128" max="128" step="1">
  </div>
  <div class="container-range">
    <label for="transparent">Transparent</label>
    <input id="transparent" onchange="editImage()" type="range" min="0" max="1" value="1" step="0.1">
  </div>
  <button id="save-button">SAVE IMAGE</button>
</div>
<script src="js/script.js"></script>
</body>
</html>
